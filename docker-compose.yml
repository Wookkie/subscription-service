services:
  db:
    image: postgres:16
    container_name: subscriptions_db
    environment:
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: subscriptions
    ports:
      - "5433:5432"
    
  app:
    build: .
    container_name: subscriptions-api
    depends_on:
      - db
    ports:
      - "8080:8080"
    env_file:
      - .env